name: Deploy to Azure Storage

# Static-Website-Hosting auf einem Azure Storage Account ($web-Container).
# Build-Output liegt in dist/app/browser (siehe angular.json -> outputPath: "dist/app").

permissions:
  contents: read

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  NODE_VERSION: 20.19.1
  BUILD_OUTPUT: dist/app/browser

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (production)
        run: npm run build

      - name: Upload to Azure Storage ($web)
        uses: azure/CLI@v2
        with:
          azcliversion: latest
          inlineScript: |
            set -euo pipefail

            # Stale Dateien entfernen (gehashte JS/CSS-Bundles vom letzten Deploy),
            # damit der $web-Container exakt dem aktuellen Build entspricht.
            az storage blob delete-batch \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
              --source '$web'

            az storage blob upload-batch \
              --account-name "${{ secrets.STORAGE_ACCOUNT_NAME }}" \
              --account-key "${{ secrets.STORAGE_ACCOUNT_KEY }}" \
              --source "${{ env.BUILD_OUTPUT }}" \
              --destination '$web' \
              --overwrite
