name: CI

permissions:
  contents: read

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

env:
  NODE_VERSION: 26

jobs:
  ci:
    runs-on: ubuntu-latest
    # Browsers + system deps are prebaked into this image, so there is no
    # `playwright install` step (the part that was hanging). Keep this tag in
    # sync with the @playwright/test version in package.json.
    container: mcr.microsoft.com/playwright:v1.58.2-noble

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit Tests
        run: npm run test:ci

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          retention-days: 30

      - name: Build
        run: npm run build

      - name: E2E Tests
        run: npm run e2e

      - name: Upload Playwright report
        # Upload even when E2E fails — that's when the report is most useful.
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # Fallow runs in its own job on a plain runner (no container). The action is
  # a composite action that references files via ${{ github.action_path }}; in a
  # container job that host path isn't visible inside the container, which makes
  # its install step fail with exit 127. A normal runner avoids that, and Fallow
  # (static analysis) has no need for the Playwright browser image anyway.
  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Fallow analysis
        uses: fallow-rs/fallow@v2.89.0
        with:
          format: sarif
          # Report findings (surfaced in Code Scanning) without failing CI.
          fail-on-issues: false

      - name: Upload Fallow results to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: fallow-results.sarif

  # Publish the Playwright and coverage HTML reports to GitHub Pages so they can
  # be browsed at a URL. Runs only on pushes to main: pull_request runs (and
  # forks) can't safely deploy to the single Pages site. Requires Pages to be
  # enabled with "Source: GitHub Actions" in repo Settings → Pages.
  publish-reports:
    if: github.event_name == 'push'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Download Playwright report
        uses: actions/download-artifact@v4
        with:
          name: playwright-report
          path: site/playwright

      - name: Download coverage report
        uses: actions/download-artifact@v4
        with:
          name: coverage
          path: site/coverage

      - name: Build landing page
        run: |
          cat > site/index.html <<'HTML'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width, initial-scale=1" />
              <title>CI Reports — blogapp-template</title>
              <style>
                body { font-family: system-ui, sans-serif; max-width: 40rem; margin: 4rem auto; padding: 0 1rem; }
                a { display: block; padding: 1rem; margin: 0.75rem 0; border: 1px solid #ddd; border-radius: 8px; text-decoration: none; color: #0366d6; }
                a:hover { background: #f6f8fa; }
              </style>
            </head>
            <body>
              <h1>CI Reports</h1>
              <a href="./playwright/index.html">▶ Playwright E2E report</a>
              <a href="./coverage/blogapp-template/index.html">▣ Unit test coverage report</a>
            </body>
          </html>
          HTML

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
