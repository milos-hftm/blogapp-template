<mat-toolbar class="app-header">
  <span class="brand">
    <mat-icon aria-hidden="true">article</mat-icon>
    <span>{{ title }}</span>
  </span>

  <span class="spacer"></span>

  <nav>
    <a
      mat-button
      routerLink="/"
      routerLinkActive="active-link"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Blog
    </a>

    <a mat-button routerLink="/about" routerLinkActive="active-link">About</a>
  </nav>

  <button
    mat-icon-button
    type="button"
    class="theme-toggle"
    (click)="toggleTheme()"
    [attr.aria-label]="isDarkTheme() ? 'Light Mode aktivieren' : 'Dark Mode aktivieren'"
  >
    <mat-icon>{{ isDarkTheme() ? 'light_mode' : 'dark_mode' }}</mat-icon>
  </button>
</mat-toolbar>

<main class="content">
  <router-outlet />
</main>
